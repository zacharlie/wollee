name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@latest run --timeout=5m --enable=errcheck --enable=unused

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: go test ./...

  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: go install github.com/go-task/task/v3/cmd/task@latest
      - run: "$(go env GOPATH)/bin/task assets:dl"
      - run: "$(go env GOPATH)/bin/task build:all"
      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/*

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: release-binaries
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
