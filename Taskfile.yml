version: '3'

tasks:
  assets:
    desc: Download embedded web assets from CDN
    cmds:
      - mkdir -p web/static
      - tmp_dir="$(mktemp -d)" && cd "$tmp_dir" && npm pack alpinejs@3.15.12 @picocss/pico@2.1.1 && mkdir alpinejs picocss && tar -xzf alpinejs-3.15.12.tgz -C alpinejs && tar -xzf picocss-pico-2.1.1.tgz -C picocss && cp alpinejs/package/dist/cdn.min.js /home/runner/work/wollee/wollee/web/static/alpine.min.js && cp picocss/package/css/pico.min.css /home/runner/work/wollee/wollee/web/static/pico.min.css
