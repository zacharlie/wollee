version: '3'

tasks:
  release:
    desc: Build cross-platform release artifacts
    cmds:
      - mkdir -p dist
      - GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/wol-agent-linux-amd64 ./cmd/agent
      - GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/wol-server-linux-amd64 ./cmd/server
      - GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/wol-agent-linux-arm64 ./cmd/agent
      - GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/wol-server-linux-arm64 ./cmd/server
      - GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/wol-agent-windows-amd64.exe ./cmd/agent
      - GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/wol-server-windows-amd64.exe ./cmd/server
      - GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/wol-agent-darwin-amd64 ./cmd/agent
      - GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/wol-server-darwin-amd64 ./cmd/server
